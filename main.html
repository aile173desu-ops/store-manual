<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>店舗マニュアル管理</title>
<style>
  :root {
    --primary: #1a73e8;
    --primary-dark: #1557b0;
    --bg: #f5f5f5;
    --sidebar-bg: #263238;
    --sidebar-text: #eceff1;
    --sidebar-hover: #37474f;
    --sidebar-active: #1a73e8;
    --card-bg: #ffffff;
    --text: #333333;
    --text-light: #666666;
    --border: #e0e0e0;
    --danger: #d32f2f;
    --success: #388e3c;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'Segoe UI', 'Meiryo', 'Yu Gothic', sans-serif;
    background: var(--bg);
    color: var(--text);
    display: flex;
    height: 100vh;
    overflow: hidden;
  }

  /* Sidebar */
  .sidebar {
    width: 280px;
    min-width: 280px;
    background: var(--sidebar-bg);
    color: var(--sidebar-text);
    display: flex;
    flex-direction: column;
    height: 100vh;
    overflow: hidden;
  }

  .sidebar-header {
    padding: 20px;
    border-bottom: 1px solid rgba(255,255,255,0.1);
    text-align: center;
  }

  .sidebar-header h1 {
    font-size: 18px;
    font-weight: 600;
    letter-spacing: 1px;
  }

  .sidebar-header p {
    font-size: 11px;
    color: #90a4ae;
    margin-top: 4px;
  }

  .sidebar-nav {
    flex: 1;
    overflow-y: auto;
    padding: 10px 0;
  }

  .sidebar-nav::-webkit-scrollbar { width: 4px; }
  .sidebar-nav::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.2); border-radius: 2px; }

  .dept-section { margin-bottom: 5px; }

  .dept-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 10px 20px;
    font-size: 12px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 1px;
    color: #90a4ae;
    cursor: pointer;
    user-select: none;
  }

  .dept-header:hover { color: #cfd8dc; }

  .dept-header .arrow {
    font-size: 10px;
    transition: transform 0.2s;
  }

  .dept-header.collapsed .arrow { transform: rotate(-90deg); }

  .dept-items { overflow: hidden; }
  .dept-header.collapsed + .dept-items { display: none; }

  .nav-item {
    display: flex;
    align-items: center;
    padding: 8px 20px 8px 30px;
    font-size: 14px;
    cursor: pointer;
    transition: background 0.15s;
    border-left: 3px solid transparent;
  }

  .nav-item:hover { background: var(--sidebar-hover); }
  .nav-item.active {
    background: rgba(26,115,232,0.15);
    border-left-color: var(--sidebar-active);
    color: #90caf9;
  }

  .nav-item .icon { margin-right: 10px; font-size: 16px; }

  .add-page-btn {
    display: flex;
    align-items: center;
    padding: 6px 20px 6px 30px;
    font-size: 13px;
    color: #90a4ae;
    cursor: pointer;
    transition: color 0.15s;
  }
  .add-page-btn:hover { color: #cfd8dc; }
  .add-page-btn .icon { margin-right: 8px; }

  .sidebar-footer {
    padding: 15px 20px;
    border-top: 1px solid rgba(255,255,255,0.1);
    display: flex;
    gap: 8px;
  }

  .sidebar-footer button {
    flex: 1;
    padding: 8px;
    font-size: 12px;
    border: 1px solid rgba(255,255,255,0.2);
    background: transparent;
    color: var(--sidebar-text);
    border-radius: 6px;
    cursor: pointer;
    transition: background 0.15s;
  }
  .sidebar-footer button:hover { background: var(--sidebar-hover); }

  /* Main content */
  .main {
    flex: 1;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  .topbar {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 12px 30px;
    background: var(--card-bg);
    border-bottom: 1px solid var(--border);
  }

  .breadcrumb {
    font-size: 14px;
    color: var(--text-light);
  }
  .breadcrumb span { color: var(--text); font-weight: 600; }

  .topbar-actions { display: flex; gap: 10px; }

  .btn {
    padding: 8px 16px;
    font-size: 13px;
    border: none;
    border-radius: 6px;
    cursor: pointer;
    font-weight: 500;
    transition: background 0.15s, transform 0.1s;
  }
  .btn:active { transform: scale(0.97); }

  .btn-primary { background: var(--primary); color: #fff; }
  .btn-primary:hover { background: var(--primary-dark); }

  .btn-secondary { background: var(--border); color: var(--text); }
  .btn-secondary:hover { background: #d0d0d0; }

  .btn-danger { background: var(--danger); color: #fff; }
  .btn-danger:hover { background: #b71c1c; }

  .btn-success { background: var(--success); color: #fff; }
  .btn-success:hover { background: #2e7d32; }

  /* Content area */
  .content {
    flex: 1;
    overflow-y: auto;
    padding: 30px;
  }

  .content::-webkit-scrollbar { width: 6px; }
  .content::-webkit-scrollbar-thumb { background: #ccc; border-radius: 3px; }

  /* Welcome screen */
  .welcome {
    text-align: center;
    padding: 50px 40px;
  }
  .welcome .logo { font-size: 64px; margin-bottom: 20px; }
  .welcome h2 { font-size: 24px; margin-bottom: 10px; }
  .welcome p { color: var(--text-light); font-size: 15px; line-height: 1.8; }

  /* Banners */
  .banner-grid {
    display: flex;
    gap: 30px;
    justify-content: center;
    margin-top: 40px;
    flex-wrap: wrap;
  }

  .banner-card {
    width: 340px;
    border-radius: 16px;
    overflow: hidden;
    cursor: pointer;
    transition: transform 0.2s, box-shadow 0.2s;
    box-shadow: 0 4px 20px rgba(0,0,0,0.08);
    text-decoration: none;
    color: inherit;
    display: block;
  }
  .banner-card:hover {
    transform: translateY(-6px);
    box-shadow: 0 12px 40px rgba(0,0,0,0.15);
  }
  .banner-card:active { transform: translateY(-2px); }

  .banner-visual {
    height: 160px;
    display: flex;
    align-items: center;
    justify-content: center;
    position: relative;
  }

  .banner-visual .banner-icon {
    font-size: 64px;
    z-index: 1;
  }

  .banner-visual .banner-bg-text {
    position: absolute;
    font-size: 120px;
    opacity: 0.08;
    font-weight: 900;
  }

  .banner-seitai .banner-visual {
    background: linear-gradient(135deg, #1a73e8 0%, #0d47a1 100%);
    color: #fff;
  }

  .banner-biyou .banner-visual {
    background: linear-gradient(135deg, #e91e90 0%, #9c27b0 100%);
    color: #fff;
  }

  .banner-body {
    padding: 20px 24px;
    background: var(--card-bg);
    text-align: left;
  }

  .banner-body h3 {
    font-size: 18px;
    font-weight: 700;
    margin-bottom: 6px;
  }

  .banner-body .banner-subtitle {
    font-size: 13px;
    color: var(--text-light);
    margin-bottom: 12px;
  }

  .banner-body .banner-tag {
    display: inline-block;
    padding: 4px 12px;
    border-radius: 20px;
    font-size: 11px;
    font-weight: 600;
  }

  .banner-seitai .banner-tag {
    background: #e3f2fd;
    color: #1565c0;
  }

  .banner-biyou .banner-tag {
    background: #fce4ec;
    color: #c2185b;
  }

  /* Editor */
  .editor-container { display: none; }
  .editor-container.active { display: block; }

  .page-title-input {
    width: 100%;
    font-size: 28px;
    font-weight: 700;
    border: none;
    background: transparent;
    padding: 0 0 15px 0;
    border-bottom: 2px solid var(--border);
    outline: none;
    color: var(--text);
    font-family: inherit;
  }
  .page-title-input:focus { border-bottom-color: var(--primary); }

  .editor-toolbar {
    display: flex;
    gap: 5px;
    padding: 12px 0;
    border-bottom: 1px solid var(--border);
    flex-wrap: wrap;
  }

  .toolbar-btn {
    width: 34px;
    height: 34px;
    display: flex;
    align-items: center;
    justify-content: center;
    border: 1px solid var(--border);
    background: var(--card-bg);
    border-radius: 4px;
    cursor: pointer;
    font-size: 14px;
    transition: background 0.15s;
  }
  .toolbar-btn:hover { background: var(--bg); }
  .toolbar-sep { width: 1px; background: var(--border); margin: 0 5px; }

  .editor-area {
    min-height: 400px;
    padding: 20px 0;
    outline: none;
    font-size: 15px;
    line-height: 1.8;
  }

  .editor-area h1 { font-size: 24px; margin: 20px 0 10px; }
  .editor-area h2 { font-size: 20px; margin: 18px 0 8px; color: var(--primary); }
  .editor-area h3 { font-size: 17px; margin: 15px 0 6px; }
  .editor-area ul, .editor-area ol { padding-left: 25px; margin: 8px 0; }
  .editor-area li { margin: 4px 0; }
  .editor-area p { margin: 8px 0; }

  /* Viewer */
  .viewer-container { display: none; }
  .viewer-container.active { display: block; }

  .viewer-title {
    font-size: 28px;
    font-weight: 700;
    padding-bottom: 15px;
    border-bottom: 2px solid var(--border);
    margin-bottom: 20px;
  }

  .viewer-body {
    font-size: 15px;
    line-height: 1.8;
  }
  .viewer-body h1 { font-size: 24px; margin: 20px 0 10px; }
  .viewer-body h2 { font-size: 20px; margin: 18px 0 8px; color: var(--primary); }
  .viewer-body h3 { font-size: 17px; margin: 15px 0 6px; }
  .viewer-body ul, .viewer-body ol { padding-left: 25px; margin: 8px 0; }
  .viewer-body li { margin: 4px 0; }

  .page-meta {
    margin-top: 30px;
    padding-top: 15px;
    border-top: 1px solid var(--border);
    font-size: 12px;
    color: #999;
  }

  /* Modal */
  .modal-overlay {
    display: none;
    position: fixed;
    top: 0; left: 0; right: 0; bottom: 0;
    background: rgba(0,0,0,0.5);
    z-index: 1000;
    align-items: center;
    justify-content: center;
  }
  .modal-overlay.active { display: flex; }

  .modal {
    background: var(--card-bg);
    border-radius: 12px;
    padding: 30px;
    min-width: 400px;
    max-width: 500px;
    box-shadow: 0 20px 60px rgba(0,0,0,0.3);
  }

  .modal h3 { margin-bottom: 15px; }
  .modal input[type="text"] {
    width: 100%;
    padding: 10px 14px;
    font-size: 15px;
    border: 1px solid var(--border);
    border-radius: 6px;
    outline: none;
    margin-bottom: 15px;
    font-family: inherit;
  }
  .modal input[type="text"]:focus { border-color: var(--primary); }

  .modal-actions {
    display: flex;
    gap: 10px;
    justify-content: flex-end;
  }

  /* Toast */
  .toast {
    position: fixed;
    bottom: 30px;
    right: 30px;
    padding: 12px 24px;
    background: #323232;
    color: #fff;
    border-radius: 8px;
    font-size: 14px;
    z-index: 2000;
    opacity: 0;
    transform: translateY(20px);
    transition: opacity 0.3s, transform 0.3s;
    pointer-events: none;
  }
  .toast.show { opacity: 1; transform: translateY(0); }

  /* Hamburger button */
  .hamburger {
    display: none;
    position: fixed;
    top: 12px;
    left: 12px;
    z-index: 1000;
    width: 44px;
    height: 44px;
    border-radius: 10px;
    background: var(--sidebar-bg);
    border: none;
    cursor: pointer;
    align-items: center;
    justify-content: center;
    box-shadow: 0 2px 8px rgba(0,0,0,0.3);
  }
  .hamburger span {
    display: block;
    width: 22px;
    height: 2px;
    background: #fff;
    margin: 4px auto;
    transition: all 0.3s;
  }
  .hamburger.active span:nth-child(1) { transform: rotate(45deg) translate(4px, 4px); }
  .hamburger.active span:nth-child(2) { opacity: 0; }
  .hamburger.active span:nth-child(3) { transform: rotate(-45deg) translate(4px, -4px); }

  .sidebar-overlay {
    display: none;
    position: fixed;
    top: 0; left: 0; right: 0; bottom: 0;
    background: rgba(0,0,0,0.5);
    z-index: 299;
  }

  /* Mobile */
  @media screen and (max-width: 768px) {
    body {
      display: block !important;
      height: auto !important;
      overflow: auto !important;
    }
    .hamburger { display: flex !important; }
    .sidebar {
      display: none !important;
      position: fixed !important;
      left: 0 !important;
      top: 0 !important;
      width: 280px !important;
      height: 100vh !important;
      z-index: 300 !important;
      box-shadow: 4px 0 20px rgba(0,0,0,0.3);
    }
    .sidebar.open { display: flex !important; }
    .sidebar-overlay.open { display: block !important; }
    .main {
      width: 100% !important;
      min-width: 0 !important;
      height: auto !important;
      overflow: auto !important;
    }
    .topbar { padding: 12px 16px 12px 64px !important; }
    .content { padding: 16px !important; overflow: visible !important; }
    .welcome { padding: 40px 16px !important; }
    .welcome .logo { font-size: 48px !important; }
    .welcome h2 { font-size: 20px !important; }
    .welcome p { font-size: 13px !important; }
    .banner-grid {
      flex-direction: column !important;
      align-items: stretch !important;
      gap: 16px !important;
    }
    .banner-card { width: 100% !important; max-width: 100% !important; }
    .banner-visual { height: 120px !important; }
    .banner-visual .banner-icon { font-size: 48px !important; }
    .banner-visual .banner-bg-text { font-size: 80px !important; }
    .banner-body h3 { font-size: 16px !important; }
    .modal { min-width: auto !important; width: 90vw !important; padding: 24px 20px !important; }
  }

  /* Print */
  @media print {
    .sidebar, .topbar, .hamburger { display: none !important; }
    .main { margin: 0; }
    .content { padding: 20px; }
  }
</style>
</head>
<body>

<!-- Hamburger -->
<button class="hamburger" id="hamburgerBtn" onclick="toggleSidebar()">
  <span></span><span></span><span></span>
</button>
<div class="sidebar-overlay" id="sidebarOverlay" onclick="toggleSidebar()"></div>

<!-- Sidebar -->
<aside class="sidebar">
  <div class="sidebar-header">
    <h1>店舗マニュアル</h1>
    <p>ローカル管理 - 外部通信なし</p>
  </div>

  <nav class="sidebar-nav" id="sidebarNav"></nav>

  <div class="sidebar-footer">
    <button onclick="exportData()" title="データをJSONファイルに保存">バックアップ</button>
    <button onclick="document.getElementById('importFile').click()" title="JSONファイルから復元">復元</button>
    <input type="file" id="importFile" accept=".json" style="display:none" onchange="importData(event)">
  </div>
</aside>

<!-- Main -->
<div class="main">
  <div class="topbar">
    <div class="breadcrumb" id="breadcrumb">ホーム</div>
    <div class="topbar-actions" id="topbarActions"></div>
  </div>

  <div class="content" id="contentArea">
    <!-- Welcome -->
    <div class="welcome" id="welcomeScreen">
      <div class="logo">📋</div>
      <h2>店舗マニュアル管理システム</h2>
      <p>下のバナーをクリックすると、各部門の資料（PDF）が開きます。<br>
      サイドバーからマニュアルページの追加・編集も可能です。<br><br>
      <strong>全データはこのPC内に保存されます。外部への通信は一切ありません。</strong></p>

      <div class="banner-grid">
        <!-- 整体部門バナー -->
        <a class="banner-card banner-seitai" href="docs/seitai.html" target="_blank">
          <div class="banner-visual">
            <span class="banner-bg-text">整体</span>
            <span class="banner-icon">🦴</span>
          </div>
          <div class="banner-body">
            <h3>整体部門</h3>
            <p class="banner-subtitle">新規問診ツール提案書 ｜ 整体 AILE SHIGA</p>
            <span class="banner-tag">マニュアルを開く</span>
          </div>
        </a>

        <!-- 美容部門バナー -->
        <a class="banner-card banner-biyou" href="docs/biyou.html" target="_blank">
          <div class="banner-visual">
            <span class="banner-bg-text">美容</span>
            <span class="banner-icon">💆</span>
          </div>
          <div class="banner-body">
            <h3>美容部門</h3>
            <p class="banner-subtitle">小顔矯正ツール × 新規問診マニュアル｜対照ガイド</p>
            <span class="banner-tag">PDF資料を開く</span>
          </div>
        </a>
      </div>
    </div>

    <!-- Editor -->
    <div class="editor-container" id="editorContainer">
      <input type="text" class="page-title-input" id="pageTitleInput" placeholder="ページタイトルを入力...">
      <div class="editor-toolbar">
        <button class="toolbar-btn" onclick="execCmd('bold')" title="太字"><b>B</b></button>
        <button class="toolbar-btn" onclick="execCmd('italic')" title="斜体"><i>I</i></button>
        <button class="toolbar-btn" onclick="execCmd('underline')" title="下線"><u>U</u></button>
        <div class="toolbar-sep"></div>
        <button class="toolbar-btn" onclick="execCmd('formatBlock','H1')" title="見出し1">H1</button>
        <button class="toolbar-btn" onclick="execCmd('formatBlock','H2')" title="見出し2">H2</button>
        <button class="toolbar-btn" onclick="execCmd('formatBlock','H3')" title="見出し3">H3</button>
        <button class="toolbar-btn" onclick="execCmd('formatBlock','P')" title="本文">P</button>
        <div class="toolbar-sep"></div>
        <button class="toolbar-btn" onclick="execCmd('insertUnorderedList')" title="箇条書き">•</button>
        <button class="toolbar-btn" onclick="execCmd('insertOrderedList')" title="番号付き">1.</button>
        <div class="toolbar-sep"></div>
        <button class="toolbar-btn" onclick="execCmd('insertHorizontalRule')" title="区切り線">―</button>
        <button class="toolbar-btn" onclick="execCmd('removeFormat')" title="書式クリア">✕</button>
      </div>
      <div class="editor-area" id="editorArea" contenteditable="true"></div>
    </div>

    <!-- Viewer -->
    <div class="viewer-container" id="viewerContainer">
      <div class="viewer-title" id="viewerTitle"></div>
      <div class="viewer-body" id="viewerBody"></div>
      <div class="page-meta" id="pageMeta"></div>
    </div>
  </div>
</div>

<!-- Modal -->
<div class="modal-overlay" id="modalOverlay">
  <div class="modal">
    <h3 id="modalTitle">新しいページ</h3>
    <input type="text" id="modalInput" placeholder="ページタイトルを入力...">
    <div class="modal-actions">
      <button class="btn btn-secondary" onclick="closeModal()">キャンセル</button>
      <button class="btn btn-primary" id="modalConfirmBtn" onclick="confirmModal()">作成</button>
    </div>
  </div>
</div>

<!-- Toast -->
<div class="toast" id="toast"></div>

<script>
// Auth guard
if(localStorage.getItem('store_auth')!=='ok'){window.location.replace('index.html');}

const STORAGE_KEY = 'store_manual_data';

const DEFAULT_DEPARTMENTS = [
  { id: 'seitai', name: '整体部門', icon: '🦴' },
  { id: 'biyou', name: '美容部門', icon: '💆' }
];

let data = loadData();
let currentPageId = null;
let isEditing = false;
let modalCallback = null;

function loadData() {
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    if (raw) return JSON.parse(raw);
  } catch(e) {}
  return { departments: DEFAULT_DEPARTMENTS, pages: [] };
}

function saveData() {
  localStorage.setItem(STORAGE_KEY, JSON.stringify(data));
}

function generateId() {
  return 'p_' + Date.now() + '_' + Math.random().toString(36).substr(2, 6);
}

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2500);
}

function formatDate(iso) {
  if (!iso) return '';
  const d = new Date(iso);
  return d.getFullYear() + '/' + (d.getMonth()+1) + '/' + d.getDate() + ' ' +
    d.getHours().toString().padStart(2,'0') + ':' + d.getMinutes().toString().padStart(2,'0');
}

// Render sidebar
function renderSidebar() {
  const nav = document.getElementById('sidebarNav');
  nav.innerHTML = '';

  data.departments.forEach(dept => {
    const section = document.createElement('div');
    section.className = 'dept-section';

    const header = document.createElement('div');
    header.className = 'dept-header';
    header.innerHTML = `<span>${dept.icon} ${dept.name}</span><span class="arrow">▼</span>`;
    header.onclick = () => {
      header.classList.toggle('collapsed');
    };
    section.appendChild(header);

    const items = document.createElement('div');
    items.className = 'dept-items';

    const pages = data.pages.filter(p => p.deptId === dept.id).sort((a,b) => a.order - b.order);
    pages.forEach(page => {
      const item = document.createElement('div');
      item.className = 'nav-item' + (page.id === currentPageId ? ' active' : '');
      item.innerHTML = `<span class="icon">📄</span>${escapeHtml(page.title || '無題')}`;
      item.onclick = () => { viewPage(page.id); closeSidebarOnMobile(); };
      section.appendChild(item);
      items.appendChild(item);
    });

    const addBtn = document.createElement('div');
    addBtn.className = 'add-page-btn';
    addBtn.innerHTML = '<span class="icon">＋</span>ページ追加';
    addBtn.onclick = () => addPage(dept.id);
    items.appendChild(addBtn);

    section.appendChild(items);
    nav.appendChild(section);
  });
}

function escapeHtml(text) {
  const d = document.createElement('div');
  d.textContent = text;
  return d.innerHTML;
}

// Show welcome
function showWelcome() {
  currentPageId = null;
  isEditing = false;
  document.getElementById('welcomeScreen').style.display = '';
  document.getElementById('editorContainer').classList.remove('active');
  document.getElementById('viewerContainer').classList.remove('active');
  document.getElementById('breadcrumb').innerHTML = 'ホーム';
  document.getElementById('topbarActions').innerHTML = '';
  renderSidebar();
}

// View page
function viewPage(pageId) {
  const page = data.pages.find(p => p.id === pageId);
  if (!page) return;

  currentPageId = pageId;
  isEditing = false;

  const dept = data.departments.find(d => d.id === page.deptId);

  document.getElementById('welcomeScreen').style.display = 'none';
  document.getElementById('editorContainer').classList.remove('active');
  document.getElementById('viewerContainer').classList.add('active');

  document.getElementById('viewerTitle').textContent = page.title || '無題';
  document.getElementById('viewerBody').innerHTML = page.content || '<p style="color:#999">（まだ内容がありません。「編集」ボタンで内容を追加してください）</p>';

  let meta = '';
  if (page.createdAt) meta += '作成: ' + formatDate(page.createdAt);
  if (page.updatedAt) meta += ' ／ 更新: ' + formatDate(page.updatedAt);
  document.getElementById('pageMeta').textContent = meta;

  document.getElementById('breadcrumb').innerHTML =
    `${dept ? dept.icon + ' ' + dept.name : ''} &gt; <span>${escapeHtml(page.title || '無題')}</span>`;

  document.getElementById('topbarActions').innerHTML =
    '<button class="btn btn-primary" onclick="editPage()">編集</button>' +
    '<button class="btn btn-danger" onclick="deletePage()" style="margin-left:5px">削除</button>';

  renderSidebar();
}

// Edit page
function editPage() {
  const page = data.pages.find(p => p.id === currentPageId);
  if (!page) return;

  isEditing = true;
  const dept = data.departments.find(d => d.id === page.deptId);

  document.getElementById('welcomeScreen').style.display = 'none';
  document.getElementById('viewerContainer').classList.remove('active');
  document.getElementById('editorContainer').classList.add('active');

  document.getElementById('pageTitleInput').value = page.title || '';
  document.getElementById('editorArea').innerHTML = page.content || '';

  document.getElementById('breadcrumb').innerHTML =
    `${dept ? dept.icon + ' ' + dept.name : ''} &gt; <span>${escapeHtml(page.title || '無題')}</span> &gt; 編集中`;

  document.getElementById('topbarActions').innerHTML =
    '<button class="btn btn-success" onclick="savePage()">保存</button>' +
    '<button class="btn btn-secondary" onclick="cancelEdit()" style="margin-left:5px">キャンセル</button>';
}

// Save page
function savePage() {
  const page = data.pages.find(p => p.id === currentPageId);
  if (!page) return;

  page.title = document.getElementById('pageTitleInput').value.trim() || '無題';
  page.content = document.getElementById('editorArea').innerHTML;
  page.updatedAt = new Date().toISOString();

  saveData();
  showToast('保存しました');
  viewPage(page.id);
}

function cancelEdit() {
  if (currentPageId) viewPage(currentPageId);
  else showWelcome();
}

// Add page
function addPage(deptId) {
  openModal('新しいページを作成', 'ページタイトルを入力...', '作成', (title) => {
    if (!title.trim()) return;
    const pages = data.pages.filter(p => p.deptId === deptId);
    const page = {
      id: generateId(),
      deptId: deptId,
      title: title.trim(),
      content: '',
      order: pages.length,
      createdAt: new Date().toISOString(),
      updatedAt: new Date().toISOString()
    };
    data.pages.push(page);
    saveData();
    showToast('ページを作成しました');
    viewPage(page.id);
  });
}

// Delete page
function deletePage() {
  const page = data.pages.find(p => p.id === currentPageId);
  if (!page) return;
  if (!confirm(`「${page.title}」を削除しますか？\nこの操作は取り消せません。`)) return;

  data.pages = data.pages.filter(p => p.id !== currentPageId);
  saveData();
  showToast('ページを削除しました');
  showWelcome();
}

// Editor commands
function execCmd(cmd, val) {
  if (cmd === 'formatBlock') {
    document.execCommand('formatBlock', false, '<' + val + '>');
  } else {
    document.execCommand(cmd, false, val || null);
  }
  document.getElementById('editorArea').focus();
}

// Modal
function openModal(title, placeholder, btnText, callback) {
  document.getElementById('modalTitle').textContent = title;
  document.getElementById('modalInput').placeholder = placeholder;
  document.getElementById('modalInput').value = '';
  document.getElementById('modalConfirmBtn').textContent = btnText;
  document.getElementById('modalOverlay').classList.add('active');
  modalCallback = callback;
  setTimeout(() => document.getElementById('modalInput').focus(), 100);
}

function closeModal() {
  document.getElementById('modalOverlay').classList.remove('active');
  modalCallback = null;
}

function confirmModal() {
  const val = document.getElementById('modalInput').value;
  if (modalCallback) modalCallback(val);
  closeModal();
}

document.getElementById('modalInput').addEventListener('keydown', (e) => {
  if (e.key === 'Enter') confirmModal();
  if (e.key === 'Escape') closeModal();
});

document.getElementById('modalOverlay').addEventListener('click', (e) => {
  if (e.target === e.currentTarget) closeModal();
});

// Export / Import
function exportData() {
  const json = JSON.stringify(data, null, 2);
  const blob = new Blob([json], { type: 'application/json' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  const now = new Date();
  const dateStr = now.getFullYear() +
    (now.getMonth()+1).toString().padStart(2,'0') +
    now.getDate().toString().padStart(2,'0');
  a.href = url;
  a.download = `store_manual_backup_${dateStr}.json`;
  a.click();
  URL.revokeObjectURL(url);
  showToast('バックアップを保存しました');
}

function importData(event) {
  const file = event.target.files[0];
  if (!file) return;
  if (!confirm('現在のデータを上書きしますか？\n（念のため先にバックアップを取ることをおすすめします）')) {
    event.target.value = '';
    return;
  }
  const reader = new FileReader();
  reader.onload = (e) => {
    try {
      const imported = JSON.parse(e.target.result);
      if (!imported.departments || !imported.pages) throw new Error('Invalid format');
      data = imported;
      saveData();
      showToast('データを復元しました');
      showWelcome();
    } catch(err) {
      alert('ファイルの読み込みに失敗しました。\n正しいバックアップファイルを選択してください。');
    }
  };
  reader.readAsText(file);
  event.target.value = '';
}

// Keyboard shortcut
document.addEventListener('keydown', (e) => {
  if ((e.ctrlKey || e.metaKey) && e.key === 's') {
    e.preventDefault();
    if (isEditing) savePage();
  }
});

// Sidebar toggle (mobile)
function toggleSidebar() {
  document.querySelector('.sidebar').classList.toggle('open');
  document.getElementById('sidebarOverlay').classList.toggle('open');
  document.getElementById('hamburgerBtn').classList.toggle('active');
}
// Close sidebar when nav item clicked on mobile
function closeSidebarOnMobile() {
  if (window.innerWidth <= 768) {
    document.querySelector('.sidebar').classList.remove('open');
    document.getElementById('sidebarOverlay').classList.remove('open');
    document.getElementById('hamburgerBtn').classList.remove('active');
  }
}

      <div class="serif">「逆に、どうなっていると一番嬉しいですか？理想の状態をちょっと教えてもらえますか？」</div>
      <div class="note">ここで出た「理想」を後のプラン提案でそのまま引用する</div>
    </div>
  </div>
</div>

<div class="step-ref">PART A：P6 骨格解説 → PART B：写真で実感 ｜ 9鍵：④⑤ ※このステップが納得感を作る核心</div>

<!-- P6 PART A -->
<div class="two-col">
  <div class="col-tool">
    <div class="col-label">ツール</div>
    <span class="page-tag">P6</span>
    <h3>骨格図（骨と悩みの対応表）</h3>

    <table class="bone-table">
      <thead>
        <tr><th>骨格の部位</th><th>歪むと出る悩み</th></tr>
      </thead>
      <tbody>
        <tr><td>側頭骨（こめかみ）</td><td>エラ張り・食いしばり・頭痛・こめかみの張り</td></tr>
        <tr><td>頬骨（頬の土台）</td><td>ほうれい線・頬のたるみ・顔の左右差</td></tr>
        <tr><td>前頭骨（おでこ）</td><td>眉毛・目の高さが左右でズレる・目が重たく見える</td></tr>
        <tr><td>下顎骨（あご）</td><td>フェイスラインの崩れ・あごのズレ・噛み合わせのバランス</td></tr>
      </tbody>
    </table>
  </div>
  <div class="col-script">
    <div class="col-label">スクリプト — PART A（骨格と悩みの因果を伝える）</div>
    <div class="serif">
      「こちらの図を見てください。お顔はいくつかの骨で構成されています。例えば、このこめかみの骨（側頭骨）がずれると、エラが張ったりこめかみが張ったりするんですよ。頬骨がずれると、ほうれい線や頬のたるみが出てきます。おでこの骨（前頭骨）がずれると、眉毛や目の高さが左右でズレてきます。つまり、お顔のお悩みは骨格の歪みから出てきているものがほとんどなんです。」
    </div>
  </div>
</div>

<!-- PART B -->
<div class="card">
  <h3>PART B｜先ほど撮った写真で実感させる</h3>
  <ol class="numbered-flow">
    <li>「では、先ほど撮った今の写真を見ていきましょう。」</li>
    <li>「パッと見て、気になるところはありますか？」
      <div class="note">何かしら答えてもらえるのを待つ。急がず反応を引き出す</div>
    </li>
    <li>「実は、ここの部分もよく見てみてください。眉毛の高さ、目の開き方、ほうれい線の出方…全体的に少し右（左）が下がっているんですよ。」</li>
    <li>「○○さんの場合は、ここ（例：側頭骨・頬骨）の骨が歪んでいるので、やっぱりこういう悩みが出てきていますよね。さっきツールで見ていただいた通りで、骨格の歪みがそのままお悩みにつながっているんです。なんとなくイメージできましたか？」</li>
  </ol>
  <div class="tip">患者さんに「気になるところ」を先に言ってもらうことで、説明が「押しつけ」でなく「共感・確認」の形になる。これが納得感の核心。</div>
</div>

<!-- P8 -->
<div class="two-col">
  <div class="col-tool">
    <div class="col-label">ツール</div>

  </div>
  <div class="col-script">
    <div class="col-label">スクリプト — P8</div>
    <div class="serif">
      「では今の歪みがなぜ出てきたかをお伝えします。こちらのツールを見てください。当てはまるものはありますか？<br><br>
      横向き・うつぶせ寝 ／ 頬杖をつく ／ 足を組む ／ 片側でばかり噛む ／ スマホを見る姿勢…<br><br>
      これらは「意図してやっている」わけではなく、無自覚に長年続けてきた習慣です。その積み重ねが少しずつ骨格をずらして、今の歪みにつながっています。」
    </div>
    <div class="tip">当てはまった項目をメモ。後の「癖をやめる」ルール説明のフックに使う。</div>

<div class="two-col">

    <div class="col-label">スクリプト — P9</div>
    <div class="serif">
      「骨格の歪みは、長年かけてついた強い癖のようなものです。一度や二度の施術で完全に治るものではなく、平均10回以上かけて少しずつ定着させていきます。ただ、正しいペースで続ければ定着後は再発しにくくなります。変化の詳細については、実際に施術しながらその都度お伝えします。」
    </div>
  </div>
</div>

<!-- P10/P11 -->
<div class="two-col">
  <div class="col-tool">

    <div class="serif">
      <strong>P10：回数について</strong><br>
      「骨の歪みの癖は非常に強い癖です。平均10回以上かけないと再発のリスクが高いです。正しい位置に定着すれば再発しにくくなります。」
    </div>

    <div class="serif">
      <strong>P11：ペースについて</strong><br>
      「理想のペースは3〜7日に1回です。施術で良くなっても最初は戻りやすいので、近いうちにまた来ていただく方が効果が定着しやすいです。難しい場合はご相談ください。一緒に合わせていきます。」
    </div>
  </div>
</div>

<!-- P12 -->
<div class="two-col">
  <div class="col-tool">
    <div class="col-label">ツール</div>

    <h3>お顔の歪みの改善法（独自施術）</h3>
  </div>
  <div class="col-script">
    <div class="col-label">スクリプト — P12</div>
    <div class="serif">
      「当院の治療は2つです。<br>
      ① 小顔矯正（骨格矯正）：骨を直接動かして、歪みを整えます。<br>
      ② フェイシャルマッサージ：筋肉を柔らかくして血流を促します。<br><br>
      施術だけでなく、セルフケアもとても大切です。施術で整えた状態を日常の中で維持するためのホームケアを一緒にお伝えします。」
    </div>
  </div>
</div>

<!-- P13 -->
<div class="two-col">
  <div class="col-tool">
    <div class="col-label">ツール</div>
    <span class="page-tag">P13</span>

  </div>
  <div class="col-script">

    <div class="serif">

<!-- P14 -->
<div class="two-col">
  <div class="col-tool">
    <div class="col-label">ツール</div>

  </div>

<!-- P15/P16 -->
<div class="two-col">
  <div class="col-tool">
    <div class="col-label">ツール</div>
    <span class="page-tag">P15 / P16</span>

  <div class="col-script">
    <div class="col-label">スクリプト — P15・P16</div>

    <div class="serif">
      <strong>P15：3ステップの流れ</strong><br>
      「今後の流れは3ステップです。<br>
      ① 改善期間（8〜12回）：まずお悩みを取っていく期間<br>
      ② 定着期間（2週間に1回ペース）：良くなった状態を体に覚えさせる期間です。この期間では、セルフケアを特によくお伝えしていきます。<br>
      ③ メンテナンス（月1回）：状態を維持して、再発を防ぐための期間です。<br>
      ・自覚として出にくい歪みを検査する<br>
      ・セルフケアで補い切れないところを一緒にケアする<br><br>
      最初はペースを早めに設定し、状態が良くなっていくのに合わせて、どんどん間隔を空けていきます。」
    </div>

    <div class="serif">
      <strong>P16：料金目安</strong><br>
      「料金の目安は、5,500円から8,000円が目安です。通いやすいように回数券もあるので、後でご案内させていただいて大丈夫ですか？」
    </div>

    <div class="serif">
      <strong>質問を受ける</strong><br>
      「ここまでで何かご質問はありますか？」
    </div>

    <div class="tip">ここで不安を解消しておくことで、施術後のクロージングがスムーズになる。質問受けが終わったら施術へ移行。</div>
  </div>
</div>

<!-- ==================== STEP 6 ==================== -->
<div class="step">
  <div class="step-header">
    <div class="step-number">6</div>

  </div>
</div>

<div class="step-ref">P7 を見せてから触診・体感確認へ ｜ 9鍵：④⑤ 「自分で確認」させる</div>

<div class="two-col">
  <div class="col-tool">
    <div class="col-label">ツール</div>
    <span class="page-tag">P7</span>
    <h3>歪み検査・触診・体感</h3>
  </div>
  <div class="col-script">
    <div class="col-label">スクリプト — P7</div>
    <ol class="numbered-flow">
      <li>「では仰向けになっていただいて、実際に鏡を使って確認します。」</li>
      <li>「頬の左右差を確認していきます。右と左で頬の高さや張り感が違うのわかりますか？」</li>
      <li>「次にエラの部分を確認します。右と左でエラの張り具合が違うのわかりますか？」</li>
      <li>「両手をフェイスラインにピタッと当ててみてください。今のサイズ感を覚えておいてください。施術後にまた同じようにやってもらうと、変化がよくわかります。」</li>
      <li>「今度は頭のサイズも確認します。耳のてっぺんに手首を当てて、頭に手を添えた状態でどれくらい隙間があるかを検査します。」</li>
    </ol>
    <div class="tip">患者さん自身に「見て・触れて確認」させることが大切。左右差や頭のサイズを実感してもらえれば、施術後の変化が際立つ。</div>
  </div>
</div>

<!-- ==================== STEP 7 ==================== -->
<div class="step">
  <div class="step-header">
    <div class="step-number">7</div>
    施術（首 → 頭蓋骨 → 骨格矯正の順）
  </div>
</div>

<div class="step-ref">ツールなし ｜ 9鍵：③情熱・④メンタル</div>

<div class="card">
  <ol class="numbered-flow">
    <li>
      <strong>施術前説明</strong><br>
      <div class="serif">「筋肉を柔らかくするために一番大切なのは血を流すことです。顔への血流は必ず首を通るので、まず首から緩めます。その後、頭の骨 → 顔の骨格の順で整えていきます。部位によって痛みが出ることがあります。つらい時はすぐ言ってください。」</div>
    </li>
    <li>
      <strong>首ほぐし後 体感確認</strong><br>
      <div class="serif">「もう一回同じところを触ってみてもらっていいですか？さっきと比べて柔らかくなっているのわかりますか？まだ顔には直接触れていないのに、顔まわりも少し柔らかくなっているはずです。それだけ首の硬さが顔に影響しているんですよ。」</div>
    </li>
    <li>
      <strong>頭の矯正</strong><br>
      <div class="serif">「では骨格を直接動かしていきます。まず頭から始めます。（施術中）動いている感じはわかりますか？これが骨格が直接動いている感覚です。硬い部位は痛みが出やすいです。無理しなくていいので遠慮なく言ってください。」</div>
    </li>
    <li>
      <strong>頭の矯正後 ビフォーアフター確認</strong><br>
      <div class="serif">「頭の矯正が終わりました。さっきと比べて、頭のサイズ感や頬の高さが変わっているのわかりますか？」</div>
    </li>
    <li>
      <strong>頬骨の矯正</strong><br>
      <div class="serif">「次は頬骨の矯正をしていきます。頬骨を整えることで、ほうれい線・たるみ・顔の左右差が改善していきます。」</div>
    </li>
    <li>
      <strong>頬骨矯正後 ビフォーアフター確認</strong><br>
      <div class="serif">「頬骨の矯正が終わりました。右と左で頬の高さや張り感、変化しているのわかりますか？」</div>
    </li>
  </ol>
  <div class="warn">骨格矯正は最初は痛みが出ることがある。「通うほど痛くなくなります」と伝えて継続動機につなげること。</div>
</div>

<!-- ==================== STEP 8 ==================== -->
<div class="step">
  <div class="step-header">
    <div class="step-number">8</div>

  </div>
</div>

<div class="step-ref">P17 → 変化を言語化 → 3ステップ再確認 → 次回予約 ｜ 9鍵：①③</div>

<div class="two-col">
  <div class="col-tool">
    <div class="col-label">ツール</div>
    <span class="page-tag">P17</span>
    <h3>治療後の確認（after検査）</h3>
  </div>
  <div class="col-script">
    <div class="col-label">スクリプト — P17</div>
    <ol class="numbered-flow">
      <li>「では写真を撮ってビフォーアフターを比べてみましょう。こちらにお座りいただいて、髪の毛を後ろにしてください。」</li>
      <li>「ビフォーとアフターを見比べてみてください。どこが一番変わって見えますか？」
        <div class="note">こちらから先に言わず、患者さんの言葉を引き出してから補足する</div>
      </li>
      <li>「実際に受けてみて、率直な感想を聞かせてもらえますか？」</li>
    </ol>
    <div class="tip">「ほうれい線が薄くなった」「目が開いた」「顔が軽い」など患者さん自身に言語化してもらうことが次のクロージングに直結する。</div>
  </div>
</div>

<div class="card">
  <h3>ツールなし — 今後の3ステップを改めて説明し、ゴールを確認する</h3>
  <ol class="numbered-flow" start="4">
    <li>
      <div class="serif">
        「すでに一度ご説明していますが、改めて今後の3ステップについてお伝えしますね。<br>
        ステップ1：改善期間 まずお悩みを取っていく期間です。<br>
        ステップ2：定着期間 良くなった状態を体に覚えさせる期間です。<br>
        ステップ3：メンテナンス 状態を維持して、再発を防ぐ期間です。<br><br>
        ○○さんは、どこまで目指したいですか？」
      </div>
      <div class="note">患者さんがどのステップを選んでも「それ、めちゃくちゃいいですね。大事なポイントです」と必ず肯定する</div>
    </li>
    <li>
      <strong>最初が一番大事であることを伝える</strong><br>
      <div class="serif">「共通して言えるのは、そこまで持っていくには結局最初が一番大事です。ステップ1が鍵になります。」</div>
    </li>
    <li>
      <strong>具体的な頻度を提案し、すり合わせる</strong><br>
      <div class="serif">「理想は3日から7日に1回なのですが、○○さんはどれくらい頑張れそうですか？」<br>（相手の回答に合わせて）<br>「では、まずはそのペースで頑張っていきましょう！」</div>
    </li>
    <li>
      <strong>その場で次回予約の日程を確定させる</strong><br>
      <div class="serif">「今日は○日なので、週1回で来られる場合、1週間後の○日までに診られるのがベストですが、このあたりで来られそうな日はありますか？」<br>（来られる日を確認して確定させる）<br>「あとは最後に受付で空いている時間を一緒に確認しますね。」</div>
      <div class="note">この場で日程の目安を確定させることで、来院率が大幅に上がる</div>
    </li>
  </ol>
</div>
